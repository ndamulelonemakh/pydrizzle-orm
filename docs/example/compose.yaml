services:
  postgres:
    image: postgres:16-alpine
    container_name: pydrizzle-example-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pydrizzle_example
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5934:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pydrizzle_example"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: